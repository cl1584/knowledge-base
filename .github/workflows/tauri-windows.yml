name: Build Tauri Windows Installer

# 触发：push tag (v*) / 手动触发
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write  # 用来创建/上传 release assets

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: windows-client/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            windows-client/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('windows-client/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        working-directory: windows-client
        run: npm ci

      - name: Build frontend
        working-directory: windows-client
        run: npm run build

      - name: Build Tauri (NSIS)
        working-directory: windows-client
        run: npx tauri build --bundles nsis

      - name: List bundle output
        shell: pwsh
        run: |
          Get-ChildItem -Path windows-client/src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $_.Extension -in '.msi', '.exe' } |
            Select-Object FullName, @{N='Size(MB)';E={[int]($_.Length/1MB)}} |
            Format-Table -AutoSize

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-base-installer
          path: |
            windows-client/src-tauri/target/release/bundle/nsis/*.exe
            windows-client/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      # 只在打 tag 时创建 Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-client/src-tauri/target/release/bundle/nsis/*.exe
            windows-client/src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true
          draft: false
          prerelease: false
